{% extends "base.html" %}
{% block title_suffix %} — Upload{% endblock %}
{% block content %}
<h2>Upload Course Content</h2>
<p>ZIP your course materials (PDFs, DOCX, PPTX, VTT transcripts, IMSCC exports) and upload.</p>
<form action="/extract" method="post" enctype="multipart/form-data">
    <label for="content_zip">
        Course Content (ZIP)
        <input type="file" id="content_zip" name="content_zip" accept=".zip,.imscc" required>
    </label>

    <fieldset>
        <legend>Options</legend>
        <label>
            <input type="checkbox" name="include_answers">
            Include quiz answer choices
        </label>
        <label>
            <input type="checkbox" name="recursive" checked>
            Scan subfolders recursively
        </label>
    </fieldset>

    <button type="submit">Extract &amp; Classify</button>
</form>
{% endblock %}
